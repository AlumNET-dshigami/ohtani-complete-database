name: Daily Stats Snapshot

on:
  schedule:
    # 毎日21:00 JST = 12:00 UTC
    - cron: '0 12 * * *'
  workflow_dispatch:
    # 手動実行も可能（テスト用）

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch and append snapshot
        run: node app/scripts/fetch-daily-snapshot.mjs

      - name: Commit if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: daily stats snapshot'
          file_pattern: 'app/public/data/title-snapshots.json'
          commit_user_name: 'github-actions[bot]'
          commit_user_email: 'github-actions[bot]@users.noreply.github.com'
